# OTel Collector — receives telemetry from AWCP Python processes
# Compatible with otel/opentelemetry-collector-contrib:0.98.0

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - action: insert
        key: environment
        value: development

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:

  # ── Traces → Tempo ──────────────────────────────────────────────────────
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # ── Metrics → Prometheus ─────────────────────────────────────────────────
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: awcp
    resource_to_telemetry_conversion:
      enabled: true

  # ── Logs → Loki (fixed for otelcol-contrib v0.98.0) ─────────────────────
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:        # ← replaces the old "labels:" block
      exporter: false
      job: true
      instance: true
      level: true

  debug:
    verbosity: basic

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [loki]

  telemetry:
    logs:
      level: "warn"
    metrics:
      address: 0.0.0.0:8888
