# Prometheus — scrape config
# Scrapes metrics from the OTel Collector's Prometheus exporter

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:

  # ── OTel Collector self-metrics ──────────────────────────────────────────
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "otel-collector"

  # ── AWCP App metrics (via OTel Collector Prometheus exporter) ─────────────
  - job_name: "awcp"
    static_configs:
      - targets: ["otel-collector:8889"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "awcp-app"

  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
